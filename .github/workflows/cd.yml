name: CD

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    environment: ENV_DEV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GIT_ACTIONS_PAT }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar -Pprofile=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: ENV_DEV

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p $HOME/ibori-be
            cd $HOME/ibori-be

            echo "${{ secrets.ENV_DEV }}" > .env

            cat <<EOF > docker-compose.yml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest
                container_name: ibori-container
                restart: always
                ports:
                  - "8080:8080"
                environment:
                  SPRING_PROFILES_ACTIVE: dev
                  SPRING_DATASOURCE_URL: jdbc:postgresql://ibori-db:5432/\${DB_NAME}
                  SPRING_DATASOURCE_USERNAME: \${DB_USER}
                  SPRING_DATASOURCE_PASSWORD: \${DB_PASS}
                  JWT_SECRET: \${JWT_SECRET}
                  CODEF_ACCESS_TOKEN: \${CODEF_ACCESS_TOKEN}
                  OPENAI_API_KEY: \${OPENAI_API_KEY}
                  OPENAI_SUMMARY_API_KEY: \${OPENAI_SUMMARY_API_KEY}
                  TZ: Asia/Seoul
                depends_on:
                  ibori-db:
                    condition: service_healthy
                networks:
                  - ibori-network

              ibori-db:
                image: postgres:15
                container_name: ibori-db-container
                restart: always
                environment:
                  POSTGRES_DB: \${DB_NAME}
                  POSTGRES_USER: \${DB_USER}
                  POSTGRES_PASSWORD: \${DB_PASS}
                  TZ: Asia/Seoul
                volumes:
                  - ibori-postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U \${DB_USER}"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
                networks:
                  - ibori-network

            networks:
              ibori-network:
                driver: bridge

            volumes:
              ibori-postgres-data:
            EOF

            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f